.header {

    background:#222;

}

nav a { color:white; text-decoration:none; }

.container {
    display:flex;
    justify-content:center;

    height:80vh;
}

    background:white;

<body>

        </div>

        <div class="search-container">

        <nav>

    <form>
        <label>Name</label>
        <input type="text" placeholder="Enter your name" required>
